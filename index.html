<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWS DASH - CLE</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
        h1, h2 { text-align: center; margin: 5px 0; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #313244; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; flex-wrap: wrap; background: #313244; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        .stats-bar { display: flex; gap: 15px; justify-content: space-around; background: #313244; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; flex-wrap: wrap;}
        select, button { padding: 8px 12px; background: #89b4fa; color: #11111b; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #74c7ec; }
        .alert-box { background: #45475a; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 6px solid #89b4fa; }
        .severity-Extreme { border-color: #f38ba8; }
        .severity-Severe { border-color: #fab387; }
        .severity-Moderate { border-color: #f9e2af; }
        .severity-Minor { border-color: #a6e3a1; }
        #status-text { color: #a6e3a1; font-weight: bold; }
    </style>
</head>
<body>

    <h1>⛈ NWS DASH</h1>
    <h2>CLEVELAND (CLE) ALERT MONITOR</h2>

    <div class="header-bar">
        <span id="status-text">IDLE</span>
        <div>
            <button onclick="enableNotifications()" id="notify-btn">🔔 Alerts Off</button>
            <button onclick="fetchAlerts()">↻ Refresh</button>
        </div>
    </div>

    <div class="controls">
        <label>County: 
            <select id="county-filter" onchange="renderAlerts()">
                <option value="All">All Counties</option>
            </select>
        </label>
        
        <label>Severity: 
            <select id="severity-filter" onchange="renderAlerts()">
                <option value="All">All Severities</option>
                <option value="Extreme">Extreme</option>
                <option value="Severe">Severe</option>
                <option value="Moderate">Moderate</option>
                <option value="Minor">Minor</option>
            </select>
        </label>

        <label>Auto-Refresh: 
            <select id="refresh-filter" onchange="setAutoRefresh()">
                <option value="0">Off</option>
                <option value="60000">1 min</option>
                <option value="300000">5 min</option>
                <option value="600000">10 min</option>
            </select>
        </label>
    </div>

    <div class="stats-bar">
        <span>Total: <span id="stat-total">0</span></span>
        <span style="color:#f38ba8">Extreme: <span id="stat-extreme">0</span></span>
        <span style="color:#fab387">Severe: <span id="stat-severe">0</span></span>
        <span style="color:#f9e2af">Moderate: <span id="stat-moderate">0</span></span>
        <span style="color:#a6e3a1">Minor: <span id="stat-minor">0</span></span>
    </div>

    <div id="alerts-container">
        <p style="text-align:center;">📡 Auto-fetch starting shortly...</p>
    </div>

    <script>
        let allAlerts = [];
        let refreshInterval;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function enableNotifications() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('notify-btn').innerText = "🔔 Alerts On";
                    new Notification("NWS DASH", { body: "Background alerts enabled for Cleveland region!" });
                }
            });
        }

        async function fetchAlerts() {
            document.getElementById('status-text').innerText = "FETCHING...";
            document.getElementById('status-text').style.color = "#f9e2af";
            
            try {
                // 1. Ask for CLE and PBZ data at the exact same time
                const cleResponse = fetch('https://api.weather.gov/alerts/active?wfo=CLE');
                const pbzResponse = fetch('https://api.weather.gov/alerts/active?wfo=PBZ');
                
                // 2. Wait for BOTH servers to send the data back
                const [cleData, pbzData] = await Promise.all([cleResponse, pbzResponse]);
                
                // 3. Convert both responses into JSON formatting
                const cleJson = await cleData.json();
                const pbzJson = await pbzData.json();
                
                // 4. Combine the alerts from both offices into one single list
                allAlerts = [...cleJson.features, ...pbzJson.features];
                
                populateCounties();
                renderAlerts();
                
                document.getElementById('status-text').innerText = "ACTIVE";
                document.getElementById('status-text').style.color = "#a6e3a1";
            } catch (error) {
                document.getElementById('status-text').innerText = "ERROR";
                document.getElementById('status-text').style.color = "#f38ba8";
            }
        }
        function populateCounties() {
            const countySelect = document.getElementById('county-filter');
            const currentSelection = countySelect.value;
            const counties = new Set();
            
            allAlerts.forEach(alert => {
                const areaDesc = alert.properties.areaDesc.split(';')[0].trim();
                counties.add(areaDesc);
            });

            countySelect.innerHTML = '<option value="All">All Counties</option>';
            Array.from(counties).sort().forEach(county => {
                countySelect.innerHTML += `<option value="${county}">${county}</option>`;
            });
            countySelect.value = currentSelection || "All";
        }

        function renderAlerts() {
            const container = document.getElementById('alerts-container');
            const countyFilter = document.getElementById('county-filter').value;
            const severityFilter = document.getElementById('severity-filter').value;
            
            container.innerHTML = "";
            let stats = { Total: 0, Extreme: 0, Severe: 0, Moderate: 0, Minor: 0 };

            let filteredAlerts = allAlerts.filter(alert => {
                const matchCounty = countyFilter === "All" || alert.properties.areaDesc.includes(countyFilter);
                const matchSeverity = severityFilter === "All" || alert.properties.severity === severityFilter;
                return matchCounty && matchSeverity;
            });

            filteredAlerts.forEach(alert => {
                const sev = alert.properties.severity;
                stats.Total++;
                if (stats[sev] !== undefined) stats[sev]++;

                const alertDiv = document.createElement('div');
                alertDiv.className = `alert-box severity-${sev}`;
                alertDiv.innerHTML = `
                    <h3 style="margin-top:0">${alert.properties.event} (${sev})</h3>
                    <p><strong>Areas:</strong> ${alert.properties.areaDesc}</p>
                    <p>${alert.properties.headline}</p>
                `;
                container.appendChild(alertDiv);
            });

            if (filteredAlerts.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>No active alerts match your filters! ☀️</p>";
            }

            document.getElementById('stat-total').innerText = stats.Total;
            document.getElementById('stat-extreme').innerText = stats.Extreme;
            document.getElementById('stat-severe').innerText = stats.Severe;
            document.getElementById('stat-moderate').innerText = stats.Moderate;
            document.getElementById('stat-minor').innerText = stats.Minor;
        }

        function setAutoRefresh() {
            clearInterval(refreshInterval);
            const ms = parseInt(document.getElementById('refresh-filter').value);
            if (ms > 0) {
                refreshInterval = setInterval(fetchAlerts, ms);
            }
        }

        // Run on load
        fetchAlerts();
    </script>
</body>
</html>
